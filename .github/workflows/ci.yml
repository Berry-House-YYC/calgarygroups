name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build site
      run: npm run build
      
    - name: Check build output
      run: |
        echo "Checking if _site directory exists..."
        test -d _site || (echo "Build failed: _site directory not found" && exit 1)
        echo "Checking if index.html exists..."
        test -f _site/index.html || (echo "Build failed: index.html not found" && exit 1)
        echo "Build successful! Files created:"
        ls -la _site/ | head -20
        
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-files
        path: _site/
        retention-days: 1
        
  netlify-status:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Wait for Netlify deployment
      uses: jakejarvis/wait-action@v0.1.1
      with:
        time: '30s'
        
    - name: Check Netlify status
      run: |
        echo "Checking Netlify deployment status..."
        echo "Site URL: https://calgarygroups.com"
        echo "Netlify will automatically deploy when build is pushed to main"
        echo "Check Netlify dashboard for deployment status: https://app.netlify.com/sites/calgarygroups/deploys"
